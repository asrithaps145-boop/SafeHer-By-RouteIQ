
<!DOCTYPE html>
<html>
<head>
    <title>Emergency SOS</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<section class="sos-section">

    <h1>Emergency SOS</h1>

    <button id="sosBtn" class="sos-button">
        🚨 SOS
    </button>

    <p>
        Press during emergency situations.
    </p>

</section>

<!-- SOS Success Popup -->
<div id="sosPopup" class="popup">
    <div class="popup-content">

        <h2>✅ Alert Sent Successfully</h2>

        <p>
            Emergency alert has been sent to your trusted contacts.<br><br>

            📍 Live location shared<br>
            📞 Emergency contacts notified<br>
            🚨 SOS request logged
        </p>

        <button onclick="closePopup()">
            OK
        </button>

    </div>
</div>

<a href="index.html" class="back-btn">
    ← Back to Home
</a>

<script src="script.js"></script>

</body>
</html>
